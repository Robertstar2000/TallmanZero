# =============================================================================
# TallmanZero - Docker Swarm Production Configuration
# =============================================================================
# Deploys the hardened Tallman Zero agent to the Docker Swarm cluster.
#
# Deployment:
#   1. Copy to /var/data/config/docker-compose-agentzero.yaml
#   2. Create data dirs: mkdir -p /var/data/agent_zero_data/{chats,memory,projects,workdir,knowledge,logs}
#   3. Deploy: make deploy STACK=agentzero
#   4. DNS: agent.tallmanequipment.com -> 10.10.20.65
#
# Management:
#   - Update: make update STACK=agentzero
#   - Remove: make destroy STACK=agentzero
#   - Logs:   docker service logs agentzero_agent-zero
# =============================================================================

networks:
  # Dedicated Traefik network for this stack (Network Isolation Protocol)
  agentzero_traefik:
    driver: overlay
    attachable: true

  # Internal network for inter-container communication
  agentzero_internal:
    driver: overlay
    attachable: true

services:
  agent-zero:
    # Custom hardened Tallman Zero image from Docker Hub
    image: tallmanit/tallmanswarm:AppTallmanZero3.0

    # Network Configuration (Dual-Network Architecture)
    networks:
      - agentzero_traefik   # For Traefik routing
      - agentzero_internal  # For internal services

    # Persistent Volume Mounts (NFS shared storage on 10.10.20.64)
    # Only user data directories are mounted to preserve the baked-in
    # application code, plugins, and hardened UI inside the container.
    volumes:
      - /var/data/agent_zero_data/chats:/a0/usr/chats
      - /var/data/agent_zero_data/memory:/a0/usr/memory
      - /var/data/agent_zero_data/projects:/a0/usr/projects
      - /var/data/agent_zero_data/workdir:/a0/usr/workdir
      - /var/data/agent_zero_data/knowledge:/a0/knowledge
      - /var/data/agent_zero_data/logs:/a0/logs

    # Environment Configuration
    environment:
      - TZ=America/New_York
      - ALLOWED_ORIGINS=https://agent.tallmanequipment.com,https://agent.tallmanequipment.com:*

    # Swarm Deployment Configuration
    deploy:
      mode: replicated
      replicas: 1

      # Rolling Update Strategy
      update_config:
        parallelism: 1
        delay: 30s
        failure_action: rollback
        monitor: 60s
        order: start-first

      # Rollback Configuration
      rollback_config:
        parallelism: 1
        delay: 10s

      # Restart Policy
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
        window: 120s

      # Resource Limits
      resources:
        limits:
          memory: 4G
          cpus: '2.0'
        reservations:
          memory: 1G
          cpus: '0.5'

      # Placement Constraints
      placement:
        constraints:
          - node.role == manager

      # Traefik Labels for Automatic Routing
      labels:
        # Enable Traefik routing
        - "traefik.enable=true"

        # Router Configuration
        - "traefik.http.routers.agentzero.rule=Host(`agent.tallmanequipment.com`)"
        - "traefik.http.routers.agentzero.entrypoints=https"
        - "traefik.http.routers.agentzero.tls.certresolver=letsencrypt"

        # Service Configuration
        - "traefik.http.services.agentzero.loadbalancer.server.port=3190"
        - "traefik.http.services.agentzero.loadbalancer.sticky.cookie=true"
        - "traefik.http.services.agentzero.loadbalancer.sticky.cookie.name=agentzero_session"

        # Network for Traefik Communication (follows swarm naming: <stackname>_<networkname>)
        - "traefik.docker.network=agentzero_agentzero_traefik"

        # Health Check
        - "traefik.http.services.agentzero.loadbalancer.healthcheck.path=/"
        - "traefik.http.services.agentzero.loadbalancer.healthcheck.interval=30s"

    # Container Health Check
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:3190/" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
