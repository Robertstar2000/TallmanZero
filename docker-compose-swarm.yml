version: "3.8"

# =============================================================================
# TallmanZero - Docker Swarm Production Configuration
# =============================================================================
# This stack exposes AgentZero through Traefik on:
#   - https://agent.tallmanequipment.com
#   - https://agent.tallmanequipment.com:3190
#
# Important:
#   The AgentZero container currently listens internally on port 80.
#   Traefik routes public traffic to that internal container port.
# =============================================================================

networks:
  traefik:
    external: true
    name: infra_traefik

services:
  agent-zero:
    image: tallmanit/tallmanswarm:AppTallmanZero3.1

    networks:
      - traefik

    volumes:
      - /var/data/agentzero/chats:/a0/usr/chats
      - /var/data/agentzero/memory:/a0/usr/memory
      - /var/data/agentzero/projects:/a0/usr/projects
      - /var/data/agentzero/workdir:/a0/usr/workdir
      - /var/data/agentzero/knowledge:/a0/knowledge
      - /var/data/agentzero/logs:/a0/logs

    environment:
      TZ: America/New_York
      ALLOWED_ORIGINS: "https://agent.tallmanequipment.com,https://agent.tallmanequipment.com:3190,https://agent.tallmanequipment.com:*"

    deploy:
      mode: replicated
      replicas: 1

      update_config:
        parallelism: 1
        delay: 30s
        failure_action: rollback
        monitor: 60s
        order: stop-first

      rollback_config:
        parallelism: 1
        delay: 10s
        failure_action: pause
        monitor: 60s
        order: stop-first

      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
        window: 120s

      resources:
        limits:
          memory: 4G
          cpus: "2.0"
        reservations:
          memory: 1G
          cpus: "0.5"

      placement:
        constraints:
          - node.role == manager

      labels:
        - "traefik.enable=true"

        # ---------------------------------------------------------------------
        # Standard HTTPS route:
        #   https://agent.tallmanequipment.com
        # ---------------------------------------------------------------------
        - "traefik.http.routers.agentzero.rule=Host(`agent.tallmanequipment.com`)"
        - "traefik.http.routers.agentzero.entrypoints=https"
        - "traefik.http.routers.agentzero.tls=true"
        - "traefik.http.routers.agentzero.tls.certresolver=letsencrypt"
        - "traefik.http.routers.agentzero.service=agentzero"

        # ---------------------------------------------------------------------
        # Optional HTTPS route on public port 3190:
        #   https://agent.tallmanequipment.com:3190
        #
        # This requires Traefik to have an entrypoint named web3190.
        # See Traefik changes below.
        # ---------------------------------------------------------------------
        - "traefik.http.routers.agentzero-3190.rule=Host(`agent.tallmanequipment.com`)"
        - "traefik.http.routers.agentzero-3190.entrypoints=web3190"
        - "traefik.http.routers.agentzero-3190.tls=true"
        - "traefik.http.routers.agentzero-3190.tls.certresolver=letsencrypt"
        - "traefik.http.routers.agentzero-3190.service=agentzero"

        # ---------------------------------------------------------------------
        # AgentZero service target.
        #
        # This is the internal container port.
        # Keep this at 80 because the container logs show:
        #   Uvicorn running on http://0.0.0.0:80
        # ---------------------------------------------------------------------
        - "traefik.http.services.agentzero.loadbalancer.server.port=80"

        # Sticky session.
        - "traefik.http.services.agentzero.loadbalancer.sticky.cookie=true"
        - "traefik.http.services.agentzero.loadbalancer.sticky.cookie.name=agentzero_session"

        # Traefik overlay network.
        - "traefik.swarm.network=infra_traefik"

        # Traefik-side health check.
        # Use the dedicated health endpoint so auth redirects do not poison liveness.
        - "traefik.http.services.agentzero.loadbalancer.healthcheck.path=/api/health"
        - "traefik.http.services.agentzero.loadbalancer.healthcheck.interval=30s"
        - "traefik.http.services.agentzero.loadbalancer.healthcheck.timeout=10s"

    # Container-side health check.
    # This checks inside the AgentZero container, so it must use port 80.
    # Probe the dedicated health endpoint instead of `/`, which may redirect.
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python3 -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:80/api/health', timeout=5)\""
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
