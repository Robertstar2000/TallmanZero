# =============================================================================
# TallmanZero - Docker Swarm Production Configuration
# =============================================================================
# This stack deploys the published TallmanZero image to Docker Swarm.
# It exposes Agent Zero through:
#   - direct Swarm ingress on published port 3190
#   - Traefik HTTPS routing for agent.tallmanequipment.com
#
# Important:
#   The published image serves internally on port 3190.
#   Swarm publishes host port 3190 -> container port 3190.
#   Traefik must target container port 3190.
# =============================================================================

networks:
  traefik:
    external: true
    name: infra_traefik

services:
  agent-zero:
    image: tallmanit/tallmanswarm:AppTallmanZero5.0

    ports:
      - target: 3190
        published: 3190
        protocol: tcp
        mode: ingress

    networks:
      - traefik

    volumes:
      # Runtime/user data only. Do not mount /a0, /a0/helpers, /a0/tools, or /a0/extensions.
      - /var/data/agent_zero_data/chats:/a0/usr/chats
      - /var/data/agent_zero_data/memory:/a0/usr/memory
      - /var/data/agent_zero_data/projects:/a0/usr/projects
      - /var/data/agent_zero_data/workdir:/a0/usr/workdir
      - /var/data/agent_zero_data/knowledge:/a0/knowledge
      - /var/data/agent_zero_data/logs:/a0/logs

    environment:
      TZ: America/New_York
      ALLOWED_ORIGINS: "https://agent.tallmanequipment.com,https://agent.tallmanequipment.com:3190"
      DEPLOYMENT_TARGET: swarm-production
      API_KEY_OPENROUTER: "${API_KEY_OPENROUTER:-}"

    deploy:
      mode: replicated
      replicas: 1

      update_config:
        parallelism: 1
        delay: 30s
        failure_action: rollback
        monitor: 60s
        order: stop-first

      rollback_config:
        parallelism: 1
        delay: 10s
        failure_action: pause
        monitor: 60s
        order: stop-first

      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
        window: 120s

      resources:
        limits:
          memory: 4G
          cpus: "2.0"
        reservations:
          memory: 1G
          cpus: "0.5"

      placement:
        constraints:
          - node.role == manager

      labels:
        - "traefik.enable=true"

        # ---------------------------------------------------------------------
        # Standard HTTPS route:
        #   https://agent.tallmanequipment.com
        # ---------------------------------------------------------------------
        - "traefik.http.routers.agentzero.rule=Host(`agent.tallmanequipment.com`)"
        - "traefik.http.routers.agentzero.entrypoints=https"
        - "traefik.http.routers.agentzero.tls=true"
        - "traefik.http.routers.agentzero.tls.certresolver=letsencrypt"
        - "traefik.http.routers.agentzero.service=agentzero"

        # Optional HTTPS route on public port 3190.
        # This requires Traefik to expose an entrypoint named web3190.
        - "traefik.http.routers.agentzero-3190.rule=Host(`agent.tallmanequipment.com`)"
        - "traefik.http.routers.agentzero-3190.entrypoints=web3190"
        - "traefik.http.routers.agentzero-3190.tls=true"
        - "traefik.http.routers.agentzero-3190.tls.certresolver=letsencrypt"
        - "traefik.http.routers.agentzero-3190.service=agentzero"

        # ---------------------------------------------------------------------
        # AgentZero service target: internal container port 3190.
        - "traefik.http.services.agentzero.loadbalancer.server.port=3190"

        # Sticky session.
        - "traefik.http.services.agentzero.loadbalancer.sticky.cookie=true"
        - "traefik.http.services.agentzero.loadbalancer.sticky.cookie.name=agentzero_session"

        # Traefik overlay network.
        - "traefik.swarm.network=infra_traefik"

        # Traefik-side health check.
        # Use the dedicated health endpoint so auth redirects do not poison liveness.
        - "traefik.http.services.agentzero.loadbalancer.healthcheck.path=/api/health"
        - "traefik.http.services.agentzero.loadbalancer.healthcheck.interval=30s"
        - "traefik.http.services.agentzero.loadbalancer.healthcheck.timeout=10s"

    # Container-side health check: must probe internal port 3190.
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python3 -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:3190/api/health', timeout=5)\""
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
