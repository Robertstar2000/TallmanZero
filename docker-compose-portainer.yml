networks:
  # Shared Traefik network (external - owned by the infra stack)
  traefik:
    external: true
    name: infra_traefik

  # Internal network for the app components
  agentzero_internal:
    driver: overlay
    attachable: true

services:
  agent-zero:
    image: tallmanit/tallmanswarm:AppTallmanZero5.0
    networks:
      - traefik           # External infra_traefik - Traefik routes via this
      - agentzero_internal
    volumes:
      # Runtime/user data only. Do not mount /a0, /a0/helpers, /a0/tools, or /a0/extensions.
      - /var/data/agent_zero_data/chats:/a0/usr/chats
      - /var/data/agent_zero_data/memory:/a0/usr/memory
      - /var/data/agent_zero_data/projects:/a0/usr/projects
      - /var/data/agent_zero_data/workdir:/a0/usr/workdir
      - /var/data/agent_zero_data/knowledge:/a0/knowledge
      - /var/data/agent_zero_data/logs:/a0/logs
    environment:
      - TZ=America/New_York
      - ALLOWED_ORIGINS=https://agent.tallmanequipment.com,https://agent.tallmanequipment.com:3190
      # Connect to the local Ollama LLM
      - OLLAMA_API_BASE=http://10.10.20.60:11434
    deploy:
      mode: replicated
      replicas: 1
      update_config:
        parallelism: 1
        delay: 30s
        failure_action: rollback
        monitor: 60s
        order: start-first
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
        window: 120s
      placement:
        constraints:
          - node.role == manager
      labels:
        # Enable Traefik routing
        - "traefik.enable=true"
        
        # Domain configuration
        - "traefik.http.routers.agentzero.rule=Host(`agent.tallmanequipment.com`)"
        - "traefik.http.routers.agentzero.entrypoints=https"
        - "traefik.http.routers.agentzero.tls.certresolver=letsencrypt"
        
        # Internal application port routing
        - "traefik.http.services.agentzero.loadbalancer.server.port=3190"
        - "traefik.http.services.agentzero.loadbalancer.sticky.cookie=true"
        - "traefik.http.services.agentzero.loadbalancer.sticky.cookie.name=agentzero_session"
        
        # Swarm Network Configuration
        # IMPORTANT: This matches <stack_name>_<network_name>
        # Below assumes you name the stack "agentzero" in Portainer. 
        # If your stack is named "agent", update this to "agent_agentzero_traefik"
        - "traefik.swarm.network=infra_traefik"

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python3 -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:3190/api/health', timeout=5)\""
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
