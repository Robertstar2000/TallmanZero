# =============================================================================
# TallmanZero - Final Robust Mount-Based Configuration
# =============================================================================
services:
  agent-zero:
    build:
      context: .
      dockerfile: Dockerfile.tallman
    image: tallmanzero:latest
    ports:
      - "3190:80"
    volumes:
      - agent-zero-data:/a0/tmp
      - ./usr:/a0/usr
    environment:
      - TZ=America/New_York
      - PYTHONDONTWRITEBYTECODE=1
      - AUTH_DISABLED=false
      - WEB_UI_PORT=80
      - WEB_UI_HOST=0.0.0.0
      - OLLAMA_BASE_URL=http://10.10.20.60:11434

volumes:
  agent-zero-data:
