# =============================================================================
# TallmanZero - Local Docker Configuration
# =============================================================================
services:
  agent-zero:
    image: tallmanit/tallmanswarm:AppTallmanZero5.0
    build:
      context: .
      dockerfile: Dockerfile.tallman
    ports:
      - "3190:3190"
    volumes:
      - agent-zero-data:/a0/tmp
      - ./usr:/a0/usr
    environment:
      - TZ=America/New_York
      - PYTHONDONTWRITEBYTECODE=1
      - AUTH_DISABLED=false
      - WEB_UI_PORT=3190
      - WEB_UI_HOST=0.0.0.0
      - OLLAMA_BASE_URL=http://host.docker.internal:11435

volumes:
  agent-zero-data:
