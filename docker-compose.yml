# =============================================================================
# TallmanZero - Final Robust Mount-Based Configuration
# =============================================================================
services:
  agent-zero:
    image: agent0ai/agent-zero:latest
    ports:
      - "3190:80"
    volumes:
      - .:/a0
      - agent-zero-data:/a0/tmp
      - ./usr:/a0/usr
      - ./webui/login.html:/a0/webui/login.html:ro
      - ./webui/signup.html:/a0/webui/signup.html:ro
      - ./webui/login.css:/a0/webui/login.css:ro
      - ./webui/components/welcome/welcome-screen.html:/a0/webui/components/welcome/welcome-screen.html:ro
    environment:
      - TZ=America/New_York
      - PYTHONDONTWRITEBYTECODE=1
      - AUTH_DISABLED=false
      - WEB_UI_PORT=80
      - WEB_UI_HOST=0.0.0.0
      - OLLAMA_BASE_URL=http://host.docker.internal:11435

volumes:
  agent-zero-data:
