<html>

<head>
  <script type="module">
    import { store } from "/components/sidebar/bottom/sidebar-bottom-store.js";
  </script>
</head>

<body>
  <div x-data>
    <template x-if="$store.sidebarBottom">
      <div class="sidebar-bottom-wrapper">
        <!-- Preferences Panel -->
        <x-component path="sidebar/bottom/preferences/preferences-panel.html"></x-component>

        <!-- Logout Button -->
        <div class="logout-section">
          <a href="/logout" class="logout-link">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
              <polyline points="16 17 21 12 16 7"></polyline>
              <line x1="21" y1="12" x2="9" y2="12"></line>
            </svg>
            <span>Logout</span>
          </a>
        </div>

        <!-- Version Info -->
        <div class="version-info">
          <span id="a0version" x-text="$store.sidebarBottom.versionLabel"></span>
        </div>
      </div>
    </template>
  </div>


  <style>
    /* Sidebar bottom wrapper */
    .sidebar-bottom-wrapper {
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    /* Logout Section */
    .logout-section {
      padding: 0.6rem var(--spacing-md);
      margin-bottom: 0.5rem;
      border-top: 1px solid var(--color-border);
    }

    .logout-link {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--color-text);
      text-decoration: none;
      font-size: var(--font-size-small);
      opacity: 0.7;
      transition: opacity 0.2s ease, color 0.2s ease;
      cursor: pointer;
    }

    .logout-link:hover {
      opacity: 1;
      color: var(--color-accent);
    }

    .logout-link svg {
      width: 16px;
      height: 16px;
    }

    /* Version label area */
    .version-info {
      line-height: 0.8rem;
      position: relative;
      margin: 0 var(--spacing-md) 1rem var(--spacing-md);
      padding-top: 10px;
      border-top: 1px solid var(--color-border);
    }

    #a0version {
      color: var(--color-text);
      opacity: 0.7;
      font-size: 0.7rem;
      user-select: all;
    }
  </style>
</body>

</html>
